name: Keep Render alive

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render backend
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend
        run: |
          echo "Pinging backend at $(date -u)"
          curl -fsS \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 60 \
            https://leadscout-backend-tu8z.onrender.com/health
          echo "Backend responded successfully"
